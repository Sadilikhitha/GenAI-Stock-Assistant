<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GenAI Stock Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:900px;
    height:85vh;
    background:#ffffff10;
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.header{
    text-align:center;
    color:white;
    margin-bottom:15px;
}

.header h1{
    font-size:32px;
}

.header p{
    color:#cbd5e1;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    border-radius:15px;
    background:#ffffff15;
}

.message{
    margin:10px 0;
    padding:12px 15px;
    border-radius:12px;
    width:fit-content;
    max-width:75%;
}

.user{
    background:#3b82f6;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    color:black;
}

.input-area{
    display:flex;
    gap:10px;
    margin-top:15px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

button{
    background:#22c55e;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

.quick{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.quick button{
    background:#334155;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📈 GenAI Stock Assistant</h1>
        <p>Stock News • Market Insights • Weather Assistant</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello 👋 Ask me about stocks, weather, or market news.
        </div>
    </div>

    <div class="quick">
        <button onclick="fillQuestion('Latest news about Tesla')">
            Tesla News
        </button>

        <button onclick="fillQuestion('Latest news about Apple')">
            Apple News
        </button>

        <button onclick="fillQuestion('Weather in Hyderabad')">
            Hyderabad Weather
        </button>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="query"
            placeholder="Ask something..."
        >
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function fillQuestion(text){
    document.getElementById("query").value = text;
}

async function sendMessage(){

    const input = document.getElementById("query");
    const message = input.value;

    if(!message) return;

    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">${message}</div>
    `;

    input.value="";

    const response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:message
        })
    });

    const data = await response.json();

    chatBox.innerHTML += `
        <div class="message bot">${data.response}</div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
